<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品反馈意见征集表 · 乐学中文坊</title>
<!--
  ============================================================
  【可编辑说明 / EDIT GUIDE】
  独立、可复制、可再次编辑的反馈表（图片已内嵌，单文件即可使用）。
  - 改产品/问题类型：搜索 const PRODUCTS，改 name/img/issues 即可，
    第2、3题会自动按所选产品生成对应反馈区。
  - 改主题色：修改下方 :root 里的 --accent 等变量。
  - 收集结果：默认导出本地 JSON / 复制剪贴板（无需后端）。
    对接 Google Sheets：把下方 const FORM_ENDPOINT 填成你的 Apps Script Web App 网址
    （形如 https://script.google.com/macros/s/XXXX/exec），提交后数据自动写入表格。
  ============================================================
-->
<style>
  :root{
    --ink:#1a2238; --paper:#f7f4ec;
    --accent:#c0392b; --accent-2:#1f6f78; --gold:#caa64b;
    --line:#d8d0bf; --muted:#6b6453;
    --radius:14px; --shadow:0 8px 30px rgba(26,34,56,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    background:
      radial-gradient(900px 500px at 12% -8%, rgba(31,111,120,.10), transparent 60%),
      radial-gradient(800px 460px at 110% 8%, rgba(192,57,43,.10), transparent 55%),
      var(--paper);
    color:var(--ink); line-height:1.7; padding:36px 16px 80px; min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto}

  header.hero{
    text-align:center; padding:34px 28px 30px;
    background:linear-gradient(160deg,#1a2238,#222d4a); color:#f7f4ec;
    border-radius:var(--radius) var(--radius) 0 0; position:relative; overflow:hidden;
  }
  .hero-logo{
    width:78px;height:78px;border-radius:18px;object-fit:cover;
    border:2px solid rgba(202,166,75,.55); box-shadow:0 6px 18px rgba(0,0,0,.3);
    margin-bottom:14px;
  }
  .brand{font-size:12.5px;letter-spacing:1.5px;color:var(--gold);margin-bottom:6px}
  header.hero h1{font-size:29px;font-weight:800;letter-spacing:1px}
  header.hero p{margin-top:11px;color:#cbd2e0;font-size:14.5px}

  .card{
    background:#fffdf8; border:1px solid var(--line); border-top:none;
    border-radius:0 0 var(--radius) var(--radius); box-shadow:var(--shadow);
    padding:34px 30px 30px;
  }
  .q-block{padding:22px 0;border-bottom:1px dashed var(--line)}
  .q-block:last-of-type{border-bottom:none}
  .q-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:50%;
    background:var(--accent);color:#fff;font-size:13px;font-weight:700;margin-right:10px;flex:none;
  }
  .q-title{display:flex;align-items:flex-start;font-size:17px;font-weight:700}
  .q-sub{margin:6px 0 14px 36px;color:var(--muted);font-size:13.5px}
  .field{margin:0 0 16px 36px}
  .field label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
  .pill{display:inline-block;font-size:12px;color:var(--accent-2);border:1px solid var(--accent-2);border-radius:20px;padding:2px 10px;margin-bottom:8px}

  textarea,input[type=text]{
    width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);
    background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;resize:vertical;transition:.15s;
  }
  textarea{min-height:90px}
  textarea:focus,input:focus{outline:none;border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(31,111,120,.15)}

  /* 产品卡片选择 */
  .prod-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-left:36px}
  .prod-card{position:relative;cursor:pointer}
  .prod-card input{position:absolute;opacity:0;pointer-events:none}
  .prod-card .inner{
    border:2px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;
    transition:.18s;height:100%;
  }
  .prod-card .thumb{width:100%;aspect-ratio:560/200;height:auto;object-fit:cover;display:block;background:#fbf9f2}
  .prod-card .pname{padding:10px 12px;font-size:14px;font-weight:700;text-align:center}
  .prod-card .check{
    position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;
    background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-size:14px;color:#fff;transition:.18s;
  }
  .prod-card input:checked + .inner{border-color:var(--accent);box-shadow:0 6px 18px rgba(192,57,43,.18)}
  .prod-card input:checked + .inner .check{background:var(--accent);border-color:var(--accent)}
  .prod-card input:checked + .inner .check::after{content:"✓"}

  /* 动态产品反馈区 */
  .prod-panel{
    margin:0 0 16px 36px;border:1.5px solid var(--line);border-left:4px solid var(--accent-2);
    border-radius:12px;padding:14px 16px 16px;background:#fff;animation:slideIn .25s ease;
  }
  .prod-panel h4{font-size:14.5px;color:var(--accent-2);margin-bottom:4px;display:flex;align-items:center;gap:9px}
  .prod-panel h4 img{width:30px;height:30px;border-radius:7px;object-fit:cover;flex:none}
  .prod-panel .inner-label{font-size:13px;font-weight:600;margin:12px 0 6px;color:var(--ink)}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .empty-hint{margin-left:36px;color:var(--muted);font-size:13.5px;font-style:italic}

  .opts{display:flex;flex-wrap:wrap;gap:8px 10px}
  .opt{position:relative}
  .opt input{position:absolute;opacity:0;pointer-events:none}
  .opt label{display:inline-block;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--line);border-radius:24px;padding:6px 14px;background:#fff;transition:.15s}
  .opt input:checked + label{background:var(--accent-2);color:#fff;border-color:var(--accent-2)}

  .rating{display:flex;gap:6px;margin-left:36px}
  .rating .star{font-size:26px;color:var(--line);cursor:pointer;transition:.12s}
  .rating .star.on{color:var(--gold)}
  .rating .star:hover{transform:scale(1.15)}

  .footer-note{
    margin-top:26px;text-align:center;padding:22px;
    background:linear-gradient(160deg,rgba(31,111,120,.08),rgba(202,166,75,.08));
    border:1px solid var(--line);border-radius:12px;font-size:15.5px;font-weight:600;color:var(--accent-2);
  }
  .footer-note span{color:var(--muted);font-weight:400;font-size:13px;display:block;margin-top:6px}

  .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px;justify-content:center}
  button{font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:none;border-radius:10px;padding:13px 26px;transition:.12s}
  button:active{transform:translateY(1px)}
  .btn-main{background:var(--accent);color:#fff}
  .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn-main:hover{opacity:.92}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 24px;border-radius:30px;font-size:14px;opacity:0;pointer-events:none;transition:.3s;z-index:99}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .req::after{content:" *";color:var(--accent)}
  @media(max-width:560px){
    .q-sub,.field,.prod-cards,.rating,.prod-panel,.empty-hint{margin-left:0}
    .prod-cards{grid-template-columns:1fr}
    header.hero h1{font-size:23px}
  }
</style>
</head>

  // ====== 产品列表：改 name/img 即可 ======
  const PRODUCTS = [
    { key:"hanziquest", name:"汉字寻踪 · HanziQuest", img:IMG_HANZI },
    { key:"blockquiz",  name:"小积木 · BlockQuiz",    img:IMG_BLOCK },
    { key:"pacetimer",  name:"课堂节奏计时器 · Class Pace Timer", img:IMG_PACE }
  ];
  const FORM_ENDPOINT = "https://script.google.com/macros/s/AKfycbxce4f_mOvjhkdnSdDvPx9O0WygMa8ay7B2ky-uRf5P5umfT5tj8QUyYSJGTm1SgwdQ/exec";

  const productOpts=document.getElementById('productOpts');
  PRODUCTS.forEach(p=>{
    productOpts.insertAdjacentHTML('beforeend',
      `<label class="prod-card">
         <input type="checkbox" id="prod_${p.key}" data-product value="${p.name}">
         <div class="inner">
           <img class="thumb" src="${p.img}" alt="${p.name}">
           <div class="pname">${p.name}</div>
           <span class="check"></span>
         </div>
       </label>`);
  });

  function selectedProducts(){return PRODUCTS.filter(p=>document.getElementById('prod_'+p.key).checked);}

  function collect(){
    const sel=selectedProducts();
    const fb=(document.getElementById('feedbackText').value||"").trim();
    return {
      提交时间:new Date().toLocaleString('zh-CN'),
      使用产品:sel.map(p=>p.name),
      问题和建议:fb,
      /* 兼容旧版收表脚本的字段结构 */
      各产品反馈:[{产品:sel.map(p=>p.name).join('、'),评分:"",问题类型:[],问题描述:fb,升级建议:""}],
      期待的AI产品:"",称呼:(document.getElementById('nickName').value||"").trim(),联系方式:""
    };
  }
  function validate(d){
    if(!d.使用产品.length){toast('请先选择您使用的产品');return false;}
    if(!d.问题和建议){toast('请填写您遇到的问题和建议');return false;}
    return true;
  }
  function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
  async function submitForm(){
    const d=collect(); if(!validate(d))return;
    if(FORM_ENDPOINT){
      try{
        // Google Apps Script: 用 text/plain 避免 CORS 预检；no-cors 模式下无法读返回值，但数据会写入
        await fetch(FORM_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(d)});
        toast(d.称呼? ('提交成功，谢谢您，'+d.称呼+' 💐') : '提交成功，感谢您的反馈！');
        setTimeout(resetForm,1200);
      }catch(e){toast('网络异常，已为您下载本地备份');downloadJSON();}
    }
    else{downloadJSON();toast('已生成反馈文件，感谢您的宝贵建议！');}
  }
  function resetForm(){
    PRODUCTS.forEach(p=>{const c=document.getElementById('prod_'+p.key);if(c)c.checked=false;});
    const f=document.getElementById('feedbackText'); if(f)f.value='';
    const n=document.getElementById('nickName'); if(n)n.value='';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function downloadJSON(){const b=new Blob([JSON.stringify(collect(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='产品反馈_'+Date.now()+'.json';a.click();URL.revokeObjectURL(a.href);}
</script>
